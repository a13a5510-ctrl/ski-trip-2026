<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="ui-page-title">載入中...</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', }</script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans antialiased transition-colors duration-300">

    <button onclick="window.toggleDarkMode()" class="absolute top-4 right-4 z-[100] w-10 h-10 rounded-full bg-white dark:bg-gray-800 shadow-md flex justify-center items-center text-gray-600 dark:text-yellow-400 active:scale-95 transition-transform"><i id="theme-icon" class="fa-solid fa-moon text-lg"></i></button>

    <div class="max-w-md mx-auto bg-white dark:bg-gray-800 h-[100dvh] relative shadow-2xl overflow-hidden flex flex-col transition-colors duration-300">

        <div id="login-screen" class="absolute inset-0 z-50 bg-white dark:bg-gray-800 flex flex-col justify-center items-center px-6 transition-opacity duration-300">
            <div id="ui-hero-icon" class="text-6xl mb-6 drop-shadow-md">⏳</div>
            <h1 id="ui-hero-title" class="text-3xl font-bold mb-2 text-gray-900 dark:text-white tracking-tight">載入中...</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-8 text-center">以 LINE 帳號快速認證登入<br>領取你的專屬<span class="ui-token-name">代幣</span></p>
            <button id="liff-login-btn" onclick="window.loginWithLine()" class="hidden w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-bold py-4 px-4 rounded-xl shadow-lg active:scale-95 text-lg flex justify-center items-center transition-transform"><i class="fa-brands fa-line text-2xl mr-2"></i> 以 LINE 帳號登入</button>
            <p id="liff-loading" class="text-gray-500 text-sm flex items-center mt-4"><i class="fa-solid fa-spinner fa-spin mr-2"></i> 正在連線總部...</p>
        </div>

        <div id="main-app" class="hidden flex-1 flex flex-col h-full overflow-hidden">
            
            <header id="app-header" class="bg-blue-600 dark:bg-blue-800 text-white pt-12 pb-5 px-6 shadow-md z-10 shrink-0">
                <div class="flex justify-between items-center mb-2">
                    <div class="flex items-center"><img id="user-avatar" src="" alt="avatar" class="w-8 h-8 rounded-full border-2 border-white mr-2 hidden object-cover shadow-sm"><span id="user-greeting" class="font-bold text-xl">嗨，旅伴</span></div>
                    <div class="bg-blue-900 bg-opacity-40 px-3 py-1 rounded-full text-sm"><i class="fa-solid fa-coins text-blue-200 mr-2"></i>餘額: <strong id="token-balance" class="text-xl ml-1">0</strong></div>
                </div>
            </header>

            <div id="countdown-banner" class="hidden shrink-0 bg-gradient-to-r from-purple-600 to-indigo-600 text-white text-center py-2 text-sm font-bold shadow-md z-10 flex justify-center items-center">
                <i id="countdown-icon" class="fa-solid fa-hourglass-half fa-spin mr-2"></i> <span id="countdown-text">計算中...</span>
            </div>

            <main class="flex-1 overflow-y-auto no-scrollbar bg-gray-50 dark:bg-gray-900 pb-24">
                <div id="tab-voting" class="p-4 space-y-5">
                    <h2 class="font-bold text-gray-700 dark:text-gray-200 mb-2 px-2 text-lg cursor-pointer flex justify-between items-center bg-gray-200 dark:bg-gray-700 p-2 rounded-lg active:scale-95 transition" onclick="window.toggleChart()"><span><i class="fa-solid fa-fire text-orange-500 mr-2"></i>即時戰況分析</span><i id="chart-toggle-icon" class="fa-solid fa-chevron-down text-gray-500"></i></h2>
                    <div id="chart-container" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-4 mb-4 transition-all"><div id="voting-chart" class="w-full h-48"></div></div>
                    <h2 class="font-bold text-gray-700 dark:text-gray-200 mb-2 px-2 text-lg"><i class="fa-solid fa-bed text-blue-500 mr-2"></i>住宿候選投票</h2>
                    <div id="hotels-container"></div>
                </div>

                <div id="tab-timeline" class="hidden p-5">
                    <h2 class="font-bold text-gray-700 dark:text-gray-200 mb-6 text-lg"><i class="fa-solid fa-route text-blue-500 mr-2"></i>最終確認行程 <span id="timeline-subtitle" class="text-sm text-blue-500 ml-2 font-medium"></span></h2>
                    <div class="relative border-l-2 border-blue-400 dark:border-blue-600 ml-3 space-y-8 pb-4"></div>
                </div>

                <div id="tab-bill" class="hidden p-4">
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-md border border-gray-100 dark:border-gray-700 relative overflow-hidden"><div class="absolute top-0 right-0 w-32 h-32 bg-blue-50 dark:bg-gray-700 rounded-bl-full -z-10 opacity-50"></div><div class="flex flex-col gap-4 mb-6 pb-6 border-b border-gray-100 dark:border-gray-700"><div class="flex justify-between items-center"><label class="font-bold text-gray-700 dark:text-gray-300"><i class="fa-solid fa-users text-blue-500 mr-2"></i>參與人數</label><div class="flex items-center bg-gray-100 dark:bg-gray-700 rounded-lg p-1"><button onclick="window.app.changePeople(-1)" class="w-8 h-8 rounded bg-white dark:bg-gray-600 shadow-sm">-</button><span id="people-count" class="w-10 text-center font-bold">4</span><button onclick="window.app.changePeople(1)" class="w-8 h-8 rounded bg-white dark:bg-gray-600 shadow-sm">+</button></div></div><div class="flex justify-between items-center"><label class="font-bold text-gray-700 dark:text-gray-300"><i class="fa-solid fa-coins text-yellow-500 mr-2"></i>結算幣值</label><div class="flex gap-1 bg-gray-100 dark:bg-gray-700 p-1 rounded-lg"><button onclick="window.app.setCurrency('JPY')" class="curr-btn px-3 py-1.5 rounded-md text-xs font-bold" data-curr="JPY">JPY</button><button onclick="window.app.setCurrency('TWD')" class="curr-btn px-3 py-1.5 rounded-md text-xs font-bold" data-curr="TWD">TWD</button><button onclick="window.app.setCurrency('HKD')" class="curr-btn px-3 py-1.5 rounded-md text-xs font-bold" data-curr="HKD">HKD</button></div></div></div><h3 class="font-bold text-xl mb-4 text-center">個人 AA 預估明細</h3><div id="bill-details" class="space-y-4 mb-8"></div><button onclick="window.copyBillMessage()" class="w-full bg-gray-900 dark:bg-blue-600 hover:bg-gray-800 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95"><i class="fa-regular fa-copy mr-2"></i> 複製請款訊息</button></div>
                </div>
            </main>

            <nav class="absolute bottom-0 w-full bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 pb-safe z-50">
                <div class="flex justify-around items-center h-16 px-2">
                    <button onclick="window.switchTab('voting')" class="nav-btn text-blue-600 flex flex-col items-center flex-1 py-1 rounded-lg" data-tab="voting"><i class="fa-solid fa-check-to-slot text-2xl mb-1"></i><span class="text-[10px] font-bold">方案海選</span></button>
                    <button onclick="window.switchTab('timeline')" class="nav-btn text-gray-400 flex flex-col items-center flex-1 py-1 rounded-lg" data-tab="timeline"><i class="fa-solid fa-route text-2xl mb-1"></i><span class="text-[10px] font-bold">行程表</span></button>
                    <button onclick="window.switchTab('bill')" class="nav-btn text-gray-400 flex flex-col items-center flex-1 py-1 rounded-lg" data-tab="bill"><i class="fa-solid fa-file-invoice-dollar text-2xl mb-1"></i><span class="text-[10px] font-bold">AA 帳單</span></button>
                </div>
            </nav>
        </div>
    </div>
    <script type="module" src="app.js"></script>
    <script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); }); }</script>
</body>
</html>
