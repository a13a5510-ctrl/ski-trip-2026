<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>造物主密室 - 滑雪戰情室後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <div id="admin-panel" class="hidden w-full max-w-2xl bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 overflow-hidden">
        <div class="bg-gray-950 p-6 border-b border-gray-700 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-500"><i class="fa-solid fa-terminal mr-2"></i>戰情室中央控制台</h1>
            <a href="index.html" target="_blank" class="text-sm text-gray-400 hover:text-white underline">前往前台首頁 ➔</a>
        </div>
        
        <div class="p-8">
            <h2 class="text-lg font-bold mb-4 text-gray-300">➕ 新增住宿候選</h2>
            <form id="add-hotel-form" class="space-y-5 mb-10" onsubmit="window.submitNewHotel(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div><label class="block text-sm font-medium text-gray-400 mb-1">飯店名稱</label><input type="text" id="hotel-name" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none"></div>
                    <div><label class="block text-sm font-medium text-gray-400 mb-1">每晚價格 (日幣)</label><input type="number" id="hotel-price" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none"></div>
                </div>
                <div><label class="block text-sm font-medium text-gray-400 mb-1">距離與特色描述</label><input type="text" id="hotel-desc" placeholder="例如：走路 5 分鐘" required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none"></div>
                <div><label class="block text-sm font-medium text-gray-400 mb-1">封面圖片網址 (URL)</label><input type="url" id="hotel-image" placeholder="https://..." required class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none"></div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-lg active:scale-95 transition-transform"><i class="fa-solid fa-cloud-arrow-up mr-2"></i> 發射至雲端</button>
            </form>

            <div class="border-t border-red-900 pt-6">
                <h2 class="text-lg font-bold mb-4 text-red-500"><i class="fa-solid fa-triangle-exclamation mr-2"></i>危險區域</h2>
                <div class="flex gap-4">
                    <button onclick="window.resetAllVotes()" class="flex-1 bg-red-900/50 hover:bg-red-800 text-red-300 border border-red-800 font-bold py-3 rounded-lg active:scale-95 transition-transform">
                        <i class="fa-solid fa-rotate-left mr-2"></i> 票數全部歸零
                    </button>
                    <button onclick="window.deleteAllHotels()" class="flex-1 bg-red-700 hover:bg-red-600 text-white font-bold py-3 rounded-lg active:scale-95 transition-transform shadow-lg shadow-red-900/50">
                        <i class="fa-solid fa-bomb mr-2"></i> 刪除所有飯店
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
